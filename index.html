<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الشخصية - [اسمك]</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* بطاقة الملف الشخصي */
        
        .profile-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 20px;
        }
        
        .profile-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .profile-header .title {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .profile-content {
            padding: 40px;
        }
        /* الأقسام */
        
        .section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            display: inline-block;
        }
        /* المهارات */
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .skill-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid #667eea;
        }
        
        .skill-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .skill-bar {
            background: #e9ecef;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .skill-level {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 4px;
            width: 0;
            transition: width 0.3s ease;
        }
        /* الخبرات */
        
        .experience-item,
        .education-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        
        .experience-item:hover,
        .education-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .item-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .item-date {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        /* روابط التواصل */
        
        .social-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover {
            transform: translateY(-3px);
        }
        /* نموذج الاتصال */
        
        .contact-form {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #667eea;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        /* للشاشات الصغيرة */
        
        @media (max-width: 768px) {
            .profile-header h1 {
                font-size: 1.8em;
            }
            .profile-content {
                padding: 20px;
            }
            .social-link {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>

        // عرض البيانات في الصفحة
        function loadPersonalData() {
            // المعلومات الأساسية
            document.getElementById('fullName').textContent = personalData.fullName;
            document.getElementById('jobTitle').textContent = personalData.jobTitle;

            // عرض المهارات

            // عرض الخبرات
            const experienceContainer = document.getElementById('experienceContainer');
            experienceContainer.innerHTML = '';
            personalData.experiences.forEach(exp => {

                expDiv.className = 'experience-item';
                expDiv.innerHTML = `

            // عرض التعليم
            const educationContainer = document.getElementById('educationContainer');

                educationContainer.appendChild(eduDiv);

            // عرض روابط التواصل
            const socialLinks = document.getElementById('socialLinks');
            socialLinks.innerHTML = '';
            personalData.socialLinks.forEach(link => {
                const linkA = document.createElement('a');
                linkA.className = 'social-link';
                linkA.href = link.url;
                linkA.target = '_blank';
                linkA.innerHTML = `${link.icon} ${link.name}`;
                socialLinks.appendChild(linkA);
            });
        }

        // معالجة نموذج الاتصال
        document.getElementById('contactForm').addEventListener('submit', function(e) {
